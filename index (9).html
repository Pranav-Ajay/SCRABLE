<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>login</title></head>
<body>
  <div>
     UID:<input type="text" id="name1"><br><br>
     PASSWORD:<input type="password" id="name2"><br><br>
    <button onclick="check()">SUBMIT</button>
  </div>
  <script>
    let count=0;
    function check() {
     const uid = document.querySelector("#name1").value;
     const password = document.querySelector("#name2").value;

     fetch("http://127.0.0.1:5000/login", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({ uid: uid, password: password })
})
.then(res => res.json())
.then(data => {
    if (data.status === "success") {
        window.location.href = "{{ url_for('check') }}";
    } else {
        alert("Invalid UID or Password");
        count += 1;
        if(count > 3){
            alert("You are blocked, get the permission to log in again");
        }
    }
})
.catch(err => console.error(err));
}
</script>

</body>
</html>
